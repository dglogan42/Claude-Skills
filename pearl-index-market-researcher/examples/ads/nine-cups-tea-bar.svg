<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" font-family="Helvetica, Arial, sans-serif">
  <title>Nine Cups Tea Bar — Pearl Index ad creative</title>
  <rect x="0" y="0" width="240" height="150" rx="6" fill="#F0DCC0"/>
  <rect x="3" y="3" width="234" height="144" rx="5" fill="none" stroke="#6B4419" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="120" y="22" text-anchor="middle" font-size="14" font-weight="800" letter-spacing="0.02em" fill="#6B4419">NINE CUPS TEA BAR</text>
  <text x="120" y="34" text-anchor="middle" font-size="8.4" font-style="italic" fill="#6B4419" fill-opacity="0.85">Skip the queue. Skip the defection.</text>

  <!-- bar chart: retention rate by queue time at purchase, baseline y=104 -->
  <line x1="30" y1="104" x2="210" y2="104" stroke="#6B4419" stroke-width="1.2"/>

  <rect x="42" y="47" width="26" height="57" fill="#6B4419"/>
  <text x="55" y="43" text-anchor="middle" font-size="8.2" font-weight="700" fill="#6B4419">92%</text>
  <text x="55" y="112" text-anchor="middle" font-size="6.4" fill="#6B4419">&#8804;3 min</text>

  <rect x="107" y="53.8" width="26" height="50.2" fill="#6B4419" fill-opacity="0.75"/>
  <text x="120" y="50" text-anchor="middle" font-size="8.2" font-weight="700" fill="#6B4419">81%</text>
  <text x="120" y="112" text-anchor="middle" font-size="6.4" fill="#6B4419">4&#8211;6 min</text>

  <rect x="172" y="79.8" width="26" height="24.2" fill="#6B4419" fill-opacity="0.4"/>
  <text x="185" y="76" text-anchor="middle" font-size="8.2" font-weight="700" fill="#6B4419">39%</text>
  <text x="185" y="112" text-anchor="middle" font-size="6.4" fill="#6B4419">&gt;6 min</text>

  <rect x="16" y="120" width="208" height="20" rx="10" fill="#6B4419"/>
  <text x="120" y="133.5" text-anchor="middle" font-size="7.2" font-weight="700" letter-spacing="0.05em" fill="#F0DCC0">PEARL INDEX VERIFIED &#183; n=412 &#183; &#177;4.8% MOE</text>
</svg>
