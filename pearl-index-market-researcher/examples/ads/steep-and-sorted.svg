<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" font-family="Helvetica, Arial, sans-serif">
  <title>Steep &amp; Sorted — Pearl Index ad creative</title>
  <rect x="0" y="0" width="240" height="150" rx="6" fill="#F0DCC0"/>
  <rect x="3" y="3" width="234" height="144" rx="5" fill="none" stroke="#6B4419" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="120" y="22" text-anchor="middle" font-size="14" font-weight="800" letter-spacing="0.02em" fill="#6B4419">STEEP &amp; SORTED</text>
  <text x="120" y="34" text-anchor="middle" font-size="8.4" font-style="italic" fill="#6B4419" fill-opacity="0.85">We don't ask. We just make it 50%.</text>

  <!-- sweetness-level gauge, needle locked at 50% -->
  <path d="M 72 90 A 48 48 0 0 1 168 90" fill="none" stroke="#6B4419" stroke-opacity="0.2" stroke-width="10" stroke-linecap="round"/>
  <line x1="120" y1="90" x2="120" y2="46" stroke="#6B4419" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="90" r="4.5" fill="#6B4419"/>
  <text x="66" y="103" text-anchor="middle" font-size="7" fill="#6B4419" fill-opacity="0.75">0%</text>
  <text x="120" y="61" text-anchor="middle" font-size="8" font-weight="700" fill="#6B4419">50%</text>
  <text x="174" y="103" text-anchor="middle" font-size="7" fill="#6B4419" fill-opacity="0.75">100%</text>
  <text x="120" y="113" text-anchor="middle" font-size="7" fill="#6B4419" fill-opacity="0.75">Sweetness-Level Independents: locked in.</text>

  <rect x="16" y="120" width="208" height="20" rx="10" fill="#6B4419"/>
  <text x="120" y="133.5" text-anchor="middle" font-size="7.2" font-weight="700" letter-spacing="0.05em" fill="#F0DCC0">PEARL INDEX VERIFIED &#183; n=412 &#183; 0% VARIANCE SINCE Q1</text>
</svg>
