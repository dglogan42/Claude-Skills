<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" font-family="Helvetica, Arial, sans-serif">
  <title>Milkwood Tea Co. — Pearl Index ad creative</title>
  <rect x="0" y="0" width="240" height="150" rx="6" fill="#E4D9EC"/>
  <rect x="3" y="3" width="234" height="144" rx="5" fill="none" stroke="#4A2E63" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- donut chart: 62% segment match -->
  <circle cx="45" cy="78" r="28" fill="none" stroke="#4A2E63" stroke-opacity="0.15" stroke-width="14"/>
  <circle cx="45" cy="78" r="28" fill="none" stroke="#4A2E63" stroke-width="14"
          stroke-dasharray="109 67" stroke-linecap="butt"
          transform="rotate(-90 45 78)"/>
  <text x="45" y="83" text-anchor="middle" font-size="15" font-weight="800" fill="#4A2E63">62%</text>

  <text x="86" y="42" font-size="15" font-weight="800" letter-spacing="0.02em" fill="#4A2E63">MILKWOOD TEA CO.</text>
  <text x="86" y="58" font-size="8.6" fill="#4A2E63">
    <tspan x="86" dy="0">Now serving what the</tspan>
    <tspan x="86" dy="11">Swing Patrons actually want.</tspan>
  </text>
  <text x="86" y="90" font-size="7.6" font-style="italic" fill="#4A2E63" fill-opacity="0.75">
    <tspan x="86" dy="0">New Oolong Blend, matched to segment</tspan>
    <tspan x="86" dy="10">preference — ask for it by name.</tspan>
  </text>

  <rect x="16" y="120" width="208" height="20" rx="10" fill="#4A2E63"/>
  <text x="120" y="133.5" text-anchor="middle" font-size="7.4" font-weight="700" letter-spacing="0.06em" fill="#E4D9EC">PEARL INDEX VERIFIED &#183; n=412 &#183; 62% SEGMENT MATCH</text>
</svg>
